server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida cae en index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API de Django.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 12m;  # acompaña DATA_UPLOAD_MAX_MEMORY_SIZE (10 MB)
    }

    # Panel de admin de Django y sus estáticos (vía WhiteNoise).
    location ~ ^/(admin|static)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Archivos subidos por los usuarios: se sirven directo desde el volumen
    # compartido con el backend (Django no sirve /media con DEBUG=False).
    location /media/ {
        alias /usr/share/media/;
    }
}
