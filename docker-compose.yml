services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cauce}
      POSTGRES_USER: ${POSTGRES_USER:-cauce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cauce}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cauce}"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-cauce}:${POSTGRES_PASSWORD:-cauce}@db:5432/${POSTGRES_DB:-cauce}
      DATABASE_SSL: "false"
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-dev-key-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      SEED_DEMO: ${SEED_DEMO:-1}
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - media:/usr/share/media:ro
    depends_on:
      - backend

volumes:
  pgdata:
  media:
